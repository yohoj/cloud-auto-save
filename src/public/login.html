<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>登录 - 云盘自动转存系统</title>
    <meta name="theme-color" content="#eaf4ff">
    <meta name="color-scheme" content="light dark">
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="自动转存" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/message.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/media-app.css">
    <style>
        html,
        body {
            width: 100%;
            min-height: 100vh;
        }
        body {
            max-width: none !important;
            display: block !important;
            margin: 0 !important;
            padding: 0 !important;
        }
        .login-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            padding:
                calc(24px + env(safe-area-inset-top))
                max(24px, env(safe-area-inset-right))
                calc(24px + env(safe-area-inset-bottom))
                max(24px, env(safe-area-inset-left));
        }
        .login-box {
            position: relative;
            overflow: hidden;
            background: var(--surface);
            padding: 2rem;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--elevation);
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(18px);
        }
        .login-title {
            margin: 0 0 0.4rem;
            color: var(--text-strong);
            font-size: 28px;
            text-align: left;
        }
        .login-subtitle {
            margin: 0 0 1.8rem;
            color: var(--text-muted);
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }
        .form-group input {
            width: 100%;
            min-height: 44px;
        }
        .login-btn {
            width: 100%;
            min-height: 44px;
            font-size: 1rem;
        }
        .login-brand {
            width: 52px;
            height: 52px;
            margin-bottom: 1.4rem;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--surface-subtle);
            position: relative;
        }
        .login-brand::before {
            content: "";
            position: absolute;
            inset: 12px;
            background: var(--accent);
            -webkit-mask: url("/favicon/favicon.svg") center / contain no-repeat;
            mask: url("/favicon/favicon.svg") center / contain no-repeat;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-brand" aria-hidden="true"></div>
            <h2 class="login-title">欢迎回来</h2>
            <p class="login-subtitle">登录你的云盘影音整理空间</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn">登录</button>
            </form>
        </div>
    </div>
    <script src="/js/theme.js"></script>
    <script src="/js/message.js"></script>
    <script>
        setTheme('auto')
        // 替换登录表单提交处理代码
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    message.error(data.error || '登录失败');
                }
            } catch (error) {
                message.error('登录失败');
            }
        });
    </script>
</body>
</html>

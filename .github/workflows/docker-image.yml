name: Build and Push Docker Image

# 允许手动触发工作流
on:
  workflow_dispatch:
    inputs:
      version:
        description: '输入要构建的镜像版本号'
        required: true
        default: '1.0.0'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      # === 核心修复步骤 1：引入并配置高兼容性的 QEMU ===
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          # 强制指定社区验证过的稳定 QEMU 镜像，防止 Node 20 编译时触发非法指令崩溃
          image: tonistiigi/binfmt:qemu-v7.0.0-28

      # === 核心修复步骤 2：升级 Buildx 到 v3 ===
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # === 核心修复步骤 3：升级 Login 到 v3 ===
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      # === 核心修复步骤 4：升级 Build-Push 到 v6 并加入缓存 ===
      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cloud-auto-save:${{ github.event.inputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cloud-auto-save:latest
          # 建议开启 gha 缓存，跨架构模拟构建非常耗时，缓存可以极大加速后续构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
